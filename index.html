<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#7c3aed" />
<title>暗算100問</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;color:#fff;background:linear-gradient(180deg,#7c3aed,#1e0a3a);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;padding:14px;gap:10px;max-width:480px;margin:0 auto}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:22px;color:#ffe066;-webkit-text-stroke:2.5px #000;paint-order:stroke fill;margin:6px 0}
.hud{display:flex;gap:8px;font-size:13px;font-weight:bold;width:100%}
.hud .box{flex:1;background:rgba(255,255,255,.12);border:2px solid #ffe066;padding:5px 8px;border-radius:8px;text-align:center}
.diff{display:flex;gap:6px;width:100%}
.diff button{flex:1;background:rgba(255,255,255,.1);border:2px solid #ffe066;color:#fff;padding:6px;font-size:11px;border-radius:8px;cursor:pointer;font-family:inherit}
.diff button.on{background:#ffe066;color:#000}
.q{font-family:"Mochiy Pop P One",sans-serif;font-size:48px;background:rgba(0,0,0,.4);border:3px solid #ffe066;border-radius:18px;padding:30px;text-align:center;width:100%;letter-spacing:.05em;line-height:1.2}
.input{font-family:"Mochiy Pop P One",sans-serif;font-size:36px;background:#fff;color:#7c3aed;border:3px solid #ffe066;border-radius:14px;padding:14px;text-align:center;width:100%;letter-spacing:.1em;min-height:64px}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%}
.pad button{aspect-ratio:1.4;background:rgba(255,255,255,.1);border:3px solid #ffe066;color:#fff;font-family:"Mochiy Pop P One",sans-serif;font-size:24px;border-radius:12px;cursor:pointer}
.pad button:active{background:#ffe066;color:#000}
.pad .ok{background:#10b981;border-color:#10b981}
.pad .x{background:#ef4444;border-color:#ef4444}
.bar{width:100%;height:8px;background:rgba(0,0,0,.4);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#10b981,#fbbf24,#ef4444);transition:width .2s}
.over{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:50}
.over.show{display:flex}
.over .panel{background:#1e0a3a;border:3px solid #ffe066;border-radius:18px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:10px}
.over h2{margin:0;font-family:"Mochiy Pop P One",sans-serif;color:#10b981}
.over button{background:#ffe066;color:#000;border:3px solid #000;padding:10px 18px;border-radius:999px;font-family:"Mochiy Pop P One",sans-serif;cursor:pointer}
</style>
</head>
<body>
<div id="app">
<h1 class="title">暗算100問 🧮</h1>
<div class="diff" id="diffs">
  <button data-d="easy" class="on">易</button>
  <button data-d="med">中</button>
  <button data-d="hard">難</button>
</div>
<div class="hud">
  <div class="box">問題: <span id="qn">0</span>/10</div>
  <div class="box">正解: <span id="ok">0</span></div>
  <div class="box">時間: <span id="tm">0</span>s</div>
</div>
<div class="bar"><div class="bar-fill" id="bar"></div></div>
<div class="q" id="q">スタート</div>
<div class="input" id="ans">_</div>
<div class="pad" id="pad"></div>
</div>
<div class="over" id="over">
  <div class="panel">
    <h2>🎉 結果</h2>
    <div>正解 <span id="o-ok">0</span> / 10</div>
    <div>タイム <span id="o-tm">0</span> 秒</div>
    <div id="o-best" style="font-size:11px;color:#fbbf24"></div>
    <button id="btn-retry">もう一度</button>
  </div>
</div>
<script>
(()=>{
'use strict';
const $=(id)=>document.getElementById(id);
const KEY='mental_jp_best';
const TOTAL=10;
let diff='easy',qn=0,ok=0,start=0,tick=null,curAns=0,input='';
const best={easy:parseFloat(localStorage.getItem(KEY+'_easy')||'9999'),med:parseFloat(localStorage.getItem(KEY+'_med')||'9999'),hard:parseFloat(localStorage.getItem(KEY+'_hard')||'9999')};
function buildPad(){
  const p=$('pad');while(p.firstChild)p.removeChild(p.firstChild);
  ['1','2','3','4','5','6','7','8','9','x','0','✓'].forEach(k=>{
    const b=document.createElement('button');b.textContent=k;
    if(k==='x')b.className='x';if(k==='✓')b.className='ok';
    b.addEventListener('click',()=>{
      en();
      if(k==='x'){input='';renderInput()}
      else if(k==='✓'){submit()}
      else{if(input.length<6){input+=k;renderInput()}}
    });
    p.appendChild(b);
  });
}
function renderInput(){$('ans').textContent=input||'_'}
function newQ(){
  let a,b,op,res;
  if(diff==='easy'){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;op=Math.random()<.5?'+':'-';if(op==='-' && b>a){[a,b]=[b,a]}res=op==='+'?a+b:a-b}
  else if(diff==='med'){a=Math.floor(Math.random()*15)+2;b=Math.floor(Math.random()*15)+2;op=['+','-','×'][Math.floor(Math.random()*3)];if(op==='-' && b>a){[a,b]=[b,a]}res=op==='+'?a+b:op==='-'?a-b:a*b}
  else{a=Math.floor(Math.random()*99)+10;b=Math.floor(Math.random()*99)+10;op=['+','-','×'][Math.floor(Math.random()*3)];if(op==='×'){a=Math.floor(Math.random()*15)+5;b=Math.floor(Math.random()*15)+5}if(op==='-' && b>a){[a,b]=[b,a]}res=op==='+'?a+b:op==='-'?a-b:a*b}
  $('q').textContent=`${a} ${op} ${b} = ?`;curAns=res;input='';renderInput();qn++;$('qn').textContent=qn;
  $('bar').style.width=(qn/TOTAL*100)+'%';
}
function submit(){
  if(input==='')return;
  if(parseInt(input)===curAns){ok++;$('ok').textContent=ok;beep(880,.08)}
  else{beep(150,.2,'sawtooth')}
  if(qn>=TOTAL)end();
  else newQ();
}
function startGame(){
  qn=0;ok=0;input='';start=Date.now();
  $('qn').textContent=0;$('ok').textContent=0;$('over').classList.remove('show');
  newQ();
  if(tick)clearInterval(tick);
  tick=setInterval(()=>$('tm').textContent=((Date.now()-start)/1000).toFixed(1),100);
}
function end(){
  clearInterval(tick);
  const t=parseFloat(((Date.now()-start)/1000).toFixed(1));
  $('o-ok').textContent=ok;$('o-tm').textContent=t;
  if(ok>=8 && t<best[diff]){best[diff]=t;localStorage.setItem(KEY+'_'+diff,String(t));$('o-best').textContent='🏆 ベスト更新！'}
  else $('o-best').textContent='ベスト: '+(best[diff]<9999?best[diff]+'s':'—');
  $('over').classList.add('show');
  fanfare();
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.1)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
document.querySelectorAll('#diffs button').forEach(b=>b.addEventListener('click',()=>{
  diff=b.dataset.d;document.querySelectorAll('#diffs button').forEach(x=>x.classList.toggle('on',x===b));
  startGame();
}));
$('btn-retry').addEventListener('click',()=>{en();startGame()});
buildPad();startGame();
})();
</script>
</body>
</html>
